  <style>
    :root {
      --photo-bg: #0f1b2f;
      --photo-glow: #c98b32;
    }

    /* Aviation page uses wider inner-page */
    .inner-page { max-width: 1100px; }

    /* =========================
       Airport Sections
       ========================= */
    .airport-links { display: flex; flex-wrap: wrap; gap: 10px; margin: 22px 0 10px; }
    .airport-section {
      margin-top: 34px; padding: 28px; border-radius: 20px;
      background: linear-gradient(135deg, #f8fbff 0%, #eef5ff 45%, #fffaf1 100%);
      border: 1px solid rgba(64,118,172,.16);
      box-shadow: 0 14px 34px rgba(20,44,77,.08);
    }
    .airport-header { display: flex; align-items: flex-end; margin-bottom: 18px; }
    .airport-name { margin: 0; color: #163453; }
    .airport-meta { margin: 0; color: var(--muted); font-style: italic; }
    .airport-map {
      width: 100%; margin: 0 0 18px; overflow: hidden;
      border-radius: 16px; border: 1px solid rgba(64,118,172,.16);
      box-shadow: 0 10px 24px rgba(20,44,77,.08); background: #fff;
    }
    .airport-map iframe { width: 100%; height: 132px; display: block; border: none; }
    .airport-description { margin: 0 0 18px; }
    .airport-map-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 12px;
      font-family: 'Open Sans', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
      font-size: 13px; font-weight: 700; text-decoration: none;
      color: var(--primary-deep);
      background: linear-gradient(135deg, #f8fbff 0%, #eef5ff 100%);
      border-top: 1px solid rgba(64,118,172,.12);
    }
    .airport-map-link:hover { background: linear-gradient(135deg, #fff8ed 0%, #ffe6bf 100%); color: #1c3550; }

    /* =========================
       Photo Grid
       ========================= */
    .photo-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 18px; }
    .photo-card {
      overflow: hidden; border-radius: 16px; background: #fff;
      border: 1px solid rgba(64,118,172,.12);
      box-shadow: 0 10px 24px rgba(20,44,77,.08);
    }
    .photo-frame { position: relative; overflow: hidden; }
    .photo-frame.placeholder-photo {
      aspect-ratio: 4 / 3;
      background:
        radial-gradient(circle at 70% 22%, rgba(245,214,146,.95) 0 9%, rgba(245,214,146,0) 26%),
        linear-gradient(180deg, #071729 0%, #18395c 48%, #6b87a7 100%);
    }
    .photo-frame.placeholder-photo::before {
      content: ""; position: absolute; inset: auto -10% 0; height: 36%;
      background: linear-gradient(180deg, rgba(8,18,32,0) 0%, rgba(11,20,35,.78) 100%);
    }
    .photo-frame.placeholder-photo::after {
      content: ""; position: absolute; right: 14%; bottom: 20%; width: 42%; height: 10%;
      border-radius: 999px 999px 45% 45%;
      background: linear-gradient(90deg, rgba(255,255,255,.92) 0%, rgba(238,244,249,.9) 78%, rgba(194,214,228,.9) 100%);
      box-shadow: -85px 9px 0 -28px rgba(255,255,255,.86), 74px 4px 0 -30px rgba(255,255,255,.82), -24px -28px 0 -30px rgba(255,255,255,.88);
      transform: rotate(-8deg);
    }
    .photo-frame.real-photo { aspect-ratio: auto; display: block; background: #0f1b2f; }
    .photo-frame.real-photo::before, .photo-frame.real-photo::after { content: none; }
    .photo-image { width: 100%; height: auto; display: block; cursor: zoom-in; }
    .photo-card:nth-child(2) .photo-frame.placeholder-photo {
      background:
        radial-gradient(circle at 26% 18%, rgba(255,199,146,.92) 0 10%, rgba(255,199,146,0) 28%),
        linear-gradient(180deg, #151d30 0%, #59466b 52%, #d6a773 100%);
    }
    .photo-card:nth-child(3) .photo-frame.placeholder-photo {
      background:
        radial-gradient(circle at 58% 20%, rgba(230,244,255,.92) 0 11%, rgba(230,244,255,0) 26%),
        linear-gradient(180deg, #091421 0%, #24405c 46%, #7aa3c7 100%);
    }
    .photo-body { padding: 16px 16px 18px; }
    .photo-title { margin: 0 0 6px; color: #163453; font-size: 1.02rem; }
    .photo-caption { margin: 0; color: var(--muted); font-size: .96rem; }

    /* =========================
       Portfolio CTA & Lightbox
       ========================= */
    .portfolio-note {
      margin-top: 26px; padding: 16px 18px;
      border-left: 4px solid var(--photo-glow); border-radius: 12px;
      background: #fff8ed; color: #5c4630;
    }
    .portfolio-cta { margin-top: 28px; display: flex; justify-content: center; }
    .instagram-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 22px; border-radius: 999px;
      font-family: 'Open Sans', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
      font-size: 15px; font-weight: 700; color: #fff; text-decoration: none;
      background: linear-gradient(135deg, #d88a4a 0%, #e8c37a 18%, #bf5f8b 52%, #765292 78%, #5d69b5 100%);
      box-shadow: 0 14px 28px rgba(118,82,146,.2);
      transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }
    .instagram-btn:hover { transform: translateY(-2px); box-shadow: 0 18px 34px rgba(118,82,146,.24); filter: saturate(1.03); }
    .instagram-btn i { font-size: 18px; }

    .lightbox {
      position: fixed; inset: 0; z-index: 2000;
      display: none; align-items: center; justify-content: center;
      padding: 28px; background: rgba(6,14,24,.88); backdrop-filter: blur(6px);
    }
    .lightbox.is-open { display: flex; }
    .lightbox-dialog {
      position: relative; max-width: min(1200px, 92vw); max-height: 88vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-image {
      max-width: 100%; max-height: 88vh; display: block;
      border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.38); background: #0f1b2f;
    }
    .lightbox-close {
      position: absolute; top: -14px; right: -14px;
      width: 42px; height: 42px; border: none; border-radius: 999px;
      color: #fff; background: rgba(12,22,36,.82);
      box-shadow: 0 12px 26px rgba(0,0,0,.28); cursor: pointer; font-size: 22px; line-height: 1;
    }
    .lightbox-close:hover { background: rgba(24,41,66,.96); }

    /* =========================
       Responsive (page-specific)
       ========================= */
    @media (max-width: 900px) {
      .photo-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .airport-section { padding: 22px 18px; }
      .photo-grid { grid-template-columns: 1fr; }
    }
  </style>
